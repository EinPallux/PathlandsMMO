# Pathlands game server — nginx TLS termination + WebSocket (wss) reverse proxy.
#
# Replace play.example.com below with YOUR domain. TLS certs are issued on the host with
# certbot and mounted read-only at /etc/letsencrypt (see docs/SERVER_DEPLOY.md).
# `game:8080` is the compose service name.

# Port 80 → redirect everything to HTTPS. (Certbot renewal uses --standalone, which frees
# this port via the compose stop/start hooks, so no ACME location is needed here.)
server {
    listen 80;
    listen [::]:80;
    server_name play.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name play.example.com;

    ssl_certificate     /etc/letsencrypt/live/play.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Ops passthrough: curl https://play.example.com/healthz | /status
    location = /healthz { proxy_pass http://game:8080/healthz; }
    location = /status  { proxy_pass http://game:8080/status; }

    # Everything else is the WebSocket (wss) game connection.
    location / {
        proxy_pass http://game:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived game sockets: don't drop them on idle.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
