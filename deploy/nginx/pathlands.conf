# Pathlands — nginx TLS termination that BOTH serves the static client AND reverse-proxies the
# game server's WebSocket (wss) + HTTP account API on the SAME origin. That single-origin shape
# is why the client needs no server URL config: it defaults to its own origin (resolveServerUrl).
#
# Replace play.example.com below with YOUR domain (three places). TLS certs are issued on the
# host with certbot and mounted read-only at /etc/letsencrypt (see docs/SERVER_DEPLOY.md).
# `game:8080` is the compose service name.

# The Connection header value for a proxied request: "upgrade" for a WebSocket handshake
# (Upgrade header present), "close" otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Port 80 → redirect everything to HTTPS. (Certbot renewal uses --standalone, which frees
# this port via the compose stop/start hooks, so no ACME location is needed here.)
server {
    listen 80;
    listen [::]:80;
    server_name play.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name play.example.com;

    ssl_certificate     /etc/letsencrypt/live/play.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # The built client SPA (baked into the web image at /usr/share/nginx/html).
    root /usr/share/nginx/html;
    index index.html;

    # Proxy headers shared by every proxied request. WebSocket upgrade headers are harmless on
    # ordinary requests (no Upgrade header ⇒ Connection: close).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    # Long-lived game sockets: don't drop them on idle.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # HTTP account API + ops endpoints → the Node game server.
    location /auth/       { proxy_pass http://game:8080; }
    location = /character { proxy_pass http://game:8080; }
    location = /healthz   { proxy_pass http://game:8080; }
    location = /status    { proxy_pass http://game:8080; }

    # Cache-bust-named assets can be cached hard (Vite fingerprints them).
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Root: a WebSocket upgrade is the game connection (→ Node server); anything else is a
    # normal page load (→ the static SPA, falling back to index.html for client routing).
    location / {
        if ($http_upgrade) {
            proxy_pass http://game:8080;
        }
        try_files $uri $uri/ /index.html;
    }
}
