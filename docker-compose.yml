# Pathlands MMO — Phase-6 deployment (ARCH §8). The `web` tier builds the static client and
# serves it with nginx (TLS), which also reverse-proxies the `game` server's wss + HTTP API on
# the same origin. One command brings up the whole stack. See docs/SERVER_DEPLOY.md.
#
#   docker compose up -d --build      # build the client + start Postgres + game server + nginx

services:
  game:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: pathlands-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: '8080'
      # REQUIRED in production: a stable random secret for signing session tokens.
      # Put it in a .env file next to this compose (AUTH_SECRET=...). Changing it logs
      # everyone out. Generate one with:  openssl rand -base64 32
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in a .env file}
      # PostgreSQL is the source of truth for all player data (and content as it migrates).
      DATABASE_URL: postgres://pathlands:${POSTGRES_PASSWORD:-changeme}@db:5432/pathlands
      # DATA_FILE is the fallback store used only if DATABASE_URL is unset (it isn't here).
      DATA_FILE: /data/pathlands.json
      # Optional tuning (defaults are sensible — see server/src/config.ts):
      # MAX_CONNECTIONS: '512'
      # MAX_MSGS_PER_SEC: '60'
      # HEARTBEAT_MS: '30000'
    volumes:
      - gamedata:/data
    # Not published to the host — nginx is the only thing that talks to it.
    expose:
      - '8080'

  web:
    # Builds the static client (three/react/vite) and serves it with nginx, which also
    # reverse-proxies the game server. Multi-stage — the VPS needs only Docker, no host Node.
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    image: pathlands-web
    restart: unless-stopped
    depends_on:
      - game
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # The site config (edit the domain here; a restart re-reads it, no rebuild needed).
      - ./deploy/nginx/pathlands.conf:/etc/nginx/conf.d/default.conf:ro
      # certbot on the host writes certs here; mounted read-only for TLS termination.
      - /etc/letsencrypt:/etc/letsencrypt:ro

  # PostgreSQL — the source of truth for all player data (and content as it migrates). The
  # server applies its schema on connect. Set a strong POSTGRES_PASSWORD in .env for production.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pathlands
      POSTGRES_USER: pathlands
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pathlands -d pathlands']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gamedata:
  pgdata:
